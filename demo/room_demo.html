<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCS — Photo → IFC Room Population</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --bg:#1b1e24; --panel:#23272f; --line:#343a44; --accent:#2f81f7; --txt:#e6e9ef; --muted:#9aa3b2; }
  html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; color: var(--txt); background: var(--bg); }
  #app { display: grid; grid-template-rows: auto 1fr; height: 100%; }
  header { display: flex; align-items: center; gap: 14px; padding: 10px 18px; background: var(--panel); border-bottom: 1px solid var(--line); }
  header h1 { font-size: 15px; font-weight: 600; }
  header .sub { font-size: 12px; color: var(--muted); }
  header .spacer { flex: 1; }
  .btn { background: #2b313b; border: 1px solid var(--line); color: var(--txt); padding: 6px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; }
  .btn:hover { border-color: var(--accent); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  main { display: grid; grid-template-columns: 1fr 460px; min-height: 0; }
  #stage { position: relative; background: linear-gradient(180deg,#2a2f38 0%, #161a20 100%); }
  #viewer-canvas { width: 100%; height: 100%; }
  #toolbar { position: absolute; top: 12px; left: 12px; display: flex; gap: 8px; z-index: 5; }
  aside { background: var(--panel); border-left: 1px solid var(--line); display: grid; grid-template-rows: auto 1fr auto; min-height: 0; }
  .panel-head { padding: 12px 16px; border-bottom: 1px solid var(--line); }
  .panel-head h2 { font-size: 13px; font-weight: 600; }
  .panel-head .meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .table-wrap { overflow: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead th { position: sticky; top: 0; background: #2b313b; text-align: left; padding: 8px 10px; color: var(--muted); font-weight: 600; border-bottom: 1px solid var(--line); }
  tbody td { padding: 8px 10px; border-bottom: 1px solid var(--line); }
  tbody tr { cursor: pointer; }
  tbody tr:hover { background: #2b313b; }
  tbody tr.sel { background: #1d3a5f; }
  .swatch { display: inline-block; width: 11px; height: 11px; border-radius: 2px; vertical-align: middle; margin-right: 6px; border: 1px solid #0006; }
  .ifc { color: var(--accent); font-family: ui-monospace, monospace; font-size: 11px; }
  .panel-foot { padding: 10px 16px; border-top: 1px solid var(--line); display: flex; gap: 8px; flex-wrap: wrap; }
  #status { position: absolute; bottom: 10px; left: 14px; font-size: 12px; color: var(--muted); z-index: 5; }
  .lic { color: var(--muted); font-size: 11px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>SCS · Photo → IFC Room Population</h1>
    <span class="sub">scan office objects → object table → AI room layout → BIM export</span>
    <span class="spacer"></span>
    <button class="btn" id="btn-fit">Fit view</button>
    <button class="btn" id="btn-walls">Toggle walls</button>
    <button class="btn" id="btn-shot">Save image</button>
  </header>
  <main>
    <div id="stage">
      <div id="toolbar"></div>
      <canvas id="viewer-canvas"></canvas>
      <div id="status">loading…</div>
    </div>
    <aside>
      <div class="panel-head">
        <h2>Object table</h2>
        <div class="meta" id="table-meta"></div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Object</th><th>IFC type</th><th>W×D×H (m)</th><th>Source / licence</th></tr></thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
      <div class="panel-foot">
        <button class="btn primary" id="btn-csv">Export CSV</button>
        <button class="btn" id="btn-ifc">Export IFC</button>
        <button class="btn" id="btn-layout">Re-generate layout</button>
      </div>
    </aside>
  </main>
</div>
<script type="module" src="room_demo.js"></script>
</body>
</html>
