<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Office chair — base graft before/after</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body { height:100%; overflow:hidden; font-family:'Segoe UI',system-ui,sans-serif; background:#eef2f9; color:#1f2733; }
    header { display:flex; align-items:center; gap:14px; padding:10px 16px; background:#fff; border-bottom:1px solid #d7deea; }
    header h1 { font-size:16px; } header .sub { font-size:12px; color:#6b7688; }
    .grid { display:grid; grid-template-columns:1fr 1fr; height:calc(100vh - 49px); }
    .panel { position:relative; border-right:1px solid #d7deea; overflow:hidden; }
    .panel:last-child { border-right:none; }
    canvas { width:100%; height:100%; display:block; }
    .cap { position:absolute; top:12px; left:12px; right:12px; z-index:5; background:rgba(255,255,255,.93);
      border:1px solid #d7deea; border-radius:10px; padding:9px 13px; box-shadow:0 2px 8px rgba(20,40,80,.08); }
    .cap b { font-size:15px; } .cap span { font-size:12px; color:#6b7688; display:block; margin-top:2px; }
    .a b { color:#c0392b; } .b b { color:#1faa60; }
    .rot { position:absolute; bottom:12px; left:50%; transform:translateX(-50%); z-index:6; display:flex; gap:6px; }
    .rot button { font-size:12px; font-weight:700; padding:6px 10px; border:1px solid #d7deea; border-radius:8px;
      background:rgba(255,255,255,.95); cursor:pointer; box-shadow:0 2px 6px rgba(20,40,80,.1); }
    .rot button:hover { border-color:#2f6bff; }
  </style>
</head>
<body>
  <header>
    <h1>Office chair — procedural base graft</h1>
    <span class="sub">Left = raw TripoSR (broken base) · Right = seat/back kept + clean 5-star base grafted · 🖱️ drag = orbit · ↻ buttons = stand it up</span>
  </header>
  <div class="grid">
    <div class="panel"><div class="cap a"><b>BEFORE — raw TripoSR</b><span>fragmented / floating wheelbase</span></div><canvas id="c0"></canvas>
      <div class="rot"><button data-i="0" data-ax="x">↻ tilt</button><button data-i="0" data-ax="y">⟳ turn</button></div></div>
    <div class="panel"><div class="cap b"><b>AFTER — base graft</b><span>generated seat/back + clean CAD 5-star base</span></div><canvas id="c1"></canvas>
      <div class="rot"><button data-i="1" data-ax="x">↻ tilt</button><button data-i="1" data-ax="y">⟳ turn</button></div></div>
  </div>
  <script type="module">
    import * as xeokit from '/vendor/xeokit-sdk/xeokit-sdk.min.es.js';
    const srcs = ['/outputs/fresh_chair_raw.glb', '/outputs/fresh_chair_grafted.glb'];
    const viewers = srcs.map((src,i) => {
      const v = new xeokit.Viewer({ canvasId:`c${i}`, transparent:false });
      v.scene.canvas.backgroundColor = [0.95,0.96,0.99];
      try {
        v.scene.clearLights();
        new xeokit.AmbientLight(v.scene, { color:[1,1,1], intensity:0.6 });
        new xeokit.DirLight(v.scene, { dir:[0.2,-0.5,-0.9], color:[1,1,1], intensity:0.9, space:'view' });
        new xeokit.DirLight(v.scene, { dir:[-0.9,-0.3,0.4], color:[1,1,1], intensity:0.7, space:'view' });
        new xeokit.DirLight(v.scene, { dir:[0.6,-0.9,0.5],  color:[1,1,1], intensity:0.6, space:'view' });
      } catch(e){}
      try { v.cameraFlight.fitFOV = 38; v.cameraControl.navMode='orbit'; v.cameraControl.followPointer=true; } catch(e){}
      return { v, loader:new xeokit.GLTFLoaderPlugin(v), model:null, rot:[0,0,0] };
    });
    function applyRot(i){ const vw=viewers[i]; if(!vw.model) return; try{ vw.model.rotation=vw.rot; }catch(e){} try{ vw.v.cameraFlight.flyTo(vw.model); }catch(e){} }
    viewers.forEach((vw,i) => {
      vw.model = vw.loader.load({ id:'m', src:srcs[i]+'?t='+Date.now(), edges:false });
      vw.model.on('loaded', () => applyRot(i));
      vw.model.on('error', e => console.warn(srcs[i], e));
    });
    document.querySelectorAll('.rot button').forEach(btn => btn.onclick = () => {
      const i=+btn.dataset.i, ax=btn.dataset.ax==='x'?0:1;
      viewers[i].rot[ax]=(viewers[i].rot[ax]+90)%360; applyRot(i);
    });
  </script>
</body>
</html>
