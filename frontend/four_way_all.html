<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>4-way — all furniture</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body { height:100%; overflow:hidden; font-family:'Segoe UI',system-ui,sans-serif; background:#eef2f9; color:#1f2733; }
    header { display:flex; align-items:center; gap:14px; padding:10px 16px; background:#fff; border-bottom:1px solid #d7deea; }
    header h1 { font-size:16px; } header .sub { font-size:12px; color:#6b7688; }
    select { margin-left:auto; padding:7px 12px; border:1px solid #d7deea; border-radius:9px; font-size:14px; font-weight:600; }
    .grid { display:grid; grid-template-columns:repeat(4,1fr); height:calc(100vh - 49px); }
    .panel { position:relative; border-right:1px solid #d7deea; overflow:hidden; }
    .panel:last-child { border-right:none; }
    canvas { width:100%; height:100%; display:block; }
    .cap { position:absolute; top:12px; left:10px; right:10px; z-index:5; background:rgba(255,255,255,.93);
      border:1px solid #d7deea; border-radius:10px; padding:8px 11px; box-shadow:0 2px 8px rgba(20,40,80,.08); }
    .cap b { font-size:13px; } .cap span { font-size:11px; color:#6b7688; display:block; margin-top:2px; }
    .a b{color:#c0392b;} .b b{color:#1faa60;} .c b{color:#7d5ba6;} .d b{color:#2f6bff;}
  </style>
</head>
<body>
  <header>
    <h1>4-way comparison — all furniture</h1>
    <span class="sub">Original · IFC-optimized · Catalog · Mesh-optimized (non-IFC) · 🖱️ drag = orbit</span>
    <select id="pick"></select>
  </header>
  <div class="grid">
    <div class="panel"><div class="cap a"><b>① Original</b><span>raw generated mesh</span></div><canvas id="c0"></canvas></div>
    <div class="panel"><div class="cap b"><b>② IFC-optimized</b><span>via optimize_ifc</span></div><canvas id="c1"></canvas></div>
    <div class="panel"><div class="cap c"><b>③ Catalog</b><span>clean catalog mesh</span></div><canvas id="c2"></canvas></div>
    <div class="panel"><div class="cap d"><b>④ Mesh-optimized</b><span>via clean_and_optimize (non-IFC)</span></div><canvas id="c3"></canvas></div>
  </div>
  <script type="module">
    import * as xeokit from '/vendor/xeokit-sdk/xeokit-sdk.min.es.js';
    const items = ['bed','bookshelf','cabinet','chair','desk','lamp','office_chair','sofa','stool','table'];
    const suffix = ['orig','ifc','catalog','mesh'];
    const pick = document.getElementById('pick');
    items.forEach(it => { const o=document.createElement('option'); o.value=it; o.textContent=it.replace('_',' '); pick.appendChild(o); });
    pick.value = 'office_chair';

    // 4 persistent viewers (4 contexts total) + a loader that swaps the model on each
    const viewers = suffix.map((_,i) => {
      const v = new xeokit.Viewer({ canvasId:`c${i}`, transparent:false });
      v.scene.canvas.backgroundColor = [0.95,0.96,0.99];
      try { v.cameraFlight.fitFOV = 35; v.cameraControl.navMode='orbit'; v.cameraControl.followPointer=true; } catch(e){}
      return { v, loader:new xeokit.GLTFLoaderPlugin(v), model:null };
    });
    function load(item) {
      viewers.forEach((vw,i) => {
        if (vw.model) { try { vw.model.destroy(); } catch(e){} }
        vw.model = vw.loader.load({ id:'m', src:`/outputs/four_way/${item}_${suffix[i]}.glb?t=`+Date.now(), edges:false });
        vw.model.on('loaded', () => { try { vw.v.cameraFlight.jumpTo(vw.model); } catch(e){} });
        vw.model.on('error', e => console.warn(item, suffix[i], e));
      });
    }
    pick.onchange = () => load(pick.value);
    load('office_chair');
  </script>
</body>
</html>
