<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCS Studio — Engine Manuals</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📖</text></svg>">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --bg:#f4f6fb; --panel:#fff; --ink:#1f2733; --mut:#6b7688; --line:#e3e8f0;
          --brand:#2f6bff; --ours:#e0812b; --shadow:0 2px 10px rgba(20,40,80,.06); }
  body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--ink); }
  header { background:var(--panel); border-bottom:1px solid var(--line); padding:18px 28px;
           display:flex; align-items:baseline; gap:14px; position:sticky; top:0; z-index:5; }
  header h1 { font-size:20px; }
  header p { color:var(--mut); font-size:13px; }
  header a { margin-left:auto; color:var(--brand); font-size:13px; text-decoration:none; font-weight:600; }
  .layout { max-width:1240px; margin:0 auto; padding:26px 28px 70px; display:grid;
            grid-template-columns:230px 1fr; gap:22px; align-items:start; }
  nav { position:sticky; top:86px; display:flex; flex-direction:column; gap:6px; }
  nav button { text-align:left; background:var(--panel); border:1px solid var(--line); border-radius:10px;
               padding:10px 14px; font:inherit; font-size:13.5px; cursor:pointer; color:var(--ink); }
  nav button:hover { border-color:var(--brand); }
  nav button.active { border-color:var(--brand); color:var(--brand); font-weight:600; }
  nav .req { font-size:11px; color:var(--mut); display:block; }
  article { background:var(--panel); border:1px solid var(--line); border-radius:14px;
            padding:26px 30px; box-shadow:var(--shadow); min-height:300px; overflow-x:auto; }
  article h1 { font-size:22px; margin:14px 0 10px; } article h1:first-child { margin-top:0; }
  article h2 { font-size:17px; margin:20px 0 8px; }
  article h3 { font-size:14.5px; margin:16px 0 6px; }
  article p, article li { font-size:14px; line-height:1.65; }
  article ul, article ol { padding-left:22px; margin:6px 0; }
  article code { background:#f0f3f9; border:1px solid var(--line); border-radius:4px;
                 padding:1px 5px; font-family:Consolas,monospace; font-size:12.5px; }
  article pre { background:#1d2733; color:#dfe6ec; border-radius:8px; padding:14px 16px;
                overflow-x:auto; margin:10px 0; }
  article pre code { background:none; border:none; color:inherit; padding:0; }
  article table { border-collapse:collapse; margin:10px 0; font-size:13px; }
  article th, article td { border:1px solid var(--line); padding:6px 10px; text-align:left; }
  article th { background:#f0f3f9; }
  article blockquote { border-left:3px solid var(--ours); padding:4px 14px; color:var(--mut); margin:8px 0; }
  @media (max-width: 860px) { .layout { grid-template-columns:1fr; } nav { position:static; flex-direction:row; flex-wrap:wrap; } }
</style>
</head>
<body>
<header>
  <h1>📖 Engine Manuals</h1>
  <p>battle-tested install &amp; run recipes for every 3D engine — requirements, limitations, fix tables</p>
  <a href="/hub.html">← Research hub</a>
</header>
<div class="layout">
  <nav id="nav"></nav>
  <article id="doc"><p style="color:var(--mut)">Loading…</p></article>
</div>
<script>
  // manual list mirrors backend/config/engines.json + the benchmark-only extras
  const MANUALS = [
    { file: 'README.md',      title: 'Overview & status board', req: 'start here' },
    { file: 'TripoSG.md',     title: 'TripoSG',                 req: '16 GB GPU · MIT · champion 0.393' },
    { file: 'TRELLIS2.md',    title: 'TRELLIS.2-4B',            req: '24 GB GPU · MIT · newest' },
    { file: 'SAM3D.md',       title: 'SAM 3D Objects',          req: '24 GB GPU · SAM licence · 0.368' },
    { file: 'TRELLIS.md',     title: 'TRELLIS (v1)',            req: '16 GB GPU · MIT · 0.347' },
    { file: 'InstantMesh.md', title: 'InstantMesh',             req: '16 GB GPU · Apache-2.0 · 0.328' },
  ];

  // compact markdown renderer — headers, lists, tables, code fences, bold/italic/links
  function mdRender(md) {
    const esc = (s) => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    const inline = (s) => esc(s)
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>')
      .replace(/\*([^*]+)\*/g, '<i>$1</i>')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    const lines = md.split(/\r?\n/);
    let html = '', inCode = false, inList = false, inTable = false;
    const closeAll = () => { if (inList) { html += '</ul>'; inList = false; }
                             if (inTable) { html += '</table>'; inTable = false; } };
    for (let i = 0; i < lines.length; i++) {
      const l = lines[i];
      if (l.startsWith('```')) { closeAll(); html += inCode ? '</code></pre>' : '<pre><code>'; inCode = !inCode; continue; }
      if (inCode) { html += esc(l) + '\n'; continue; }
      if (/^\s*\|/.test(l)) {
        if (/^\s*\|[\s\-:|]+\|\s*$/.test(l)) continue;              // separator row
        if (!inTable) { closeAll(); html += '<table>'; inTable = true; }
        const cells = l.trim().replace(/^\||\|$/g, '').split('|');
        const tag = (i + 1 < lines.length && /^\s*\|[\s\-:|]+\|\s*$/.test(lines[i + 1])) ? 'th' : 'td';
        html += '<tr>' + cells.map((c) => `<${tag}>${inline(c.trim())}</${tag}>`).join('') + '</tr>';
        continue;
      } else if (inTable) { html += '</table>'; inTable = false; }
      const h = l.match(/^(#{1,3})\s+(.*)/);
      if (h) { closeAll(); html += `<h${h[1].length}>${inline(h[2])}</h${h[1].length}>`; continue; }
      if (/^\s*[-*]\s+/.test(l)) {
        if (!inList) { html += '<ul>'; inList = true; }
        html += '<li>' + inline(l.replace(/^\s*[-*]\s+/, '')) + '</li>'; continue;
      } else if (inList) { html += '</ul>'; inList = false; }
      if (/^>\s?/.test(l)) { html += '<blockquote>' + inline(l.replace(/^>\s?/, '')) + '</blockquote>'; continue; }
      if (l.trim() === '') { closeAll(); continue; }
      html += '<p>' + inline(l) + '</p>';
    }
    closeAll();
    if (inCode) html += '</code></pre>';
    return html;
  }

  const nav = document.getElementById('nav');
  const doc = document.getElementById('doc');
  async function show(m, btn) {
    nav.querySelectorAll('button').forEach((b) => b.classList.remove('active'));
    btn.classList.add('active');
    doc.innerHTML = '<p style="color:var(--mut)">Loading…</p>';
    try {
      const r = await fetch('/manuals-src/' + m.file);
      if (!r.ok) throw new Error(r.status);
      doc.innerHTML = mdRender(await r.text());
    } catch (e) {
      doc.innerHTML = '<p>Could not load ' + m.file + ' — is the server running with the deliverable/ folder present?</p>';
    }
  }
  MANUALS.forEach((m, i) => {
    const b = document.createElement('button');
    b.innerHTML = `${m.title}<span class="req">${m.req}</span>`;
    b.onclick = () => show(m, b);
    nav.appendChild(b);
    if (i === 0) show(m, b);
  });
</script>
</body>
</html>
