<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCS Studio — Building Fleet Comparison</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏢</text></svg>">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --bg:#f4f6fb; --panel:#fff; --ink:#1f2733; --mut:#6b7688; --line:#e3e8f0;
          --brand:#2f6bff; --shadow:0 2px 10px rgba(20,40,80,.06); }
  body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--ink); }
  header { background:var(--panel); border-bottom:1px solid var(--line); padding:18px 28px;
           display:flex; align-items:baseline; gap:14px; position:sticky; top:0; z-index:5; }
  header h1 { font-size:20px; }
  header p { color:var(--mut); font-size:13px; }
  header a { margin-left:auto; color:var(--brand); font-size:13px; text-decoration:none; font-weight:600; }
  main { max-width:1500px; margin:0 auto; padding:24px 28px 60px; }
  .bldg { background:var(--panel); border:1px solid var(--line); border-radius:16px;
          box-shadow:var(--shadow); padding:20px 24px; margin-bottom:28px; }
  .bldg h2 { font-size:17px; margin-bottom:2px; }
  .bldg .sub { color:var(--mut); font-size:13px; margin-bottom:6px; }
  .badges { display:flex; flex-wrap:wrap; gap:8px; margin:10px 0 4px; }
  .badge { background:#eef4ff; border:1px solid #cfe0ff; color:#1f52d6; font-size:12px;
           font-weight:600; padding:4px 12px; border-radius:10px; }
  .badge.ok { background:#e7f7ee; border-color:#bfe8d0; color:#177a46; }
  .sched { font-size:12px; color:var(--mut); margin:8px 0 2px; line-height:1.55;
           column-width: 340px; column-gap: 28px; }
  .floor { margin-top:18px; }
  .floor h3 { font-size:13px; text-transform:uppercase; letter-spacing:.05em;
              color:var(--mut); margin-bottom:8px; }
  .pair { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .pair figure { border:1px solid var(--line); border-radius:12px; overflow:hidden; background:#fff; }
  .pair img { width:100%; display:block; cursor:zoom-in; }
  .pair figcaption { font-size:11.5px; color:var(--mut); padding:7px 12px; border-top:1px solid var(--line); }
  .err { color:#d64545; font-size:13px; }
  #lightbox { position:fixed; inset:0; background:rgba(15,20,30,.88); display:none;
              align-items:center; justify-content:center; z-index:50; cursor:zoom-out; }
  #lightbox img { max-width:96vw; max-height:96vh; border-radius:8px; }
  @media (max-width: 900px) { .pair { grid-template-columns:1fr; } }
</style>
</head>
<body>
<header>
  <h1>🏢 Building Fleet Comparison</h1>
  <p>every registered building · every floor · 3D dollhouse + 2D ergonomic plan · captured live from this machine</p>
  <a href="/">← back to SCS Studio</a>
</header>
<main id="main"><p style="color:var(--mut)">Loading fleet data…</p></main>
<div id="lightbox" onclick="this.style.display='none'"><img id="lightimg"></div>
<script>
(async () => {
  const main = document.getElementById('main');
  let stats;
  try {
    stats = await (await fetch('fleet/stats.json?t=' + Date.now())).json();
  } catch (e) {
    main.innerHTML = '<p class="err">No capture yet — the fleet screenshots have not been generated. ' +
      'Ask Claude to re-run the fleet capture, then refresh.</p>';
    return;
  }
  main.innerHTML = '';
  // feature showcase (if captured): X-ray + dollhouse views of the full system
  try {
    const sc = await (await fetch('fleet/showcase.json?t=' + Date.now())).json();
    if (sc.shots && sc.shots.length) {
      const sec = document.createElement('section');
      sec.className = 'bldg';
      sec.innerHTML = '<h2>✨ Feature Showcase — the complete system</h2>' +
        '<p class="sub" style="max-width:1050px;line-height:1.65;margin-bottom:6px">' +
        'Two real architectural IFC buildings, furnished end-to-end by the ergonomics engine and rendered ' +
        'live from this machine. Every room was measured from the IFC, given a smart per-type suggestion, and ' +
        'solved with CP-SAT under human constraints: chairs pair with desks and are rotated to face them, ' +
        'monitors and laptops sit ON the desks with their screens turned toward the sitter, stools fan around ' +
        'tables in even petal rings while the table itself is pulled to the open centre of the room, planters ' +
        'flank workstations, and every piece keeps its people-space (legroom, pull-out, door swing) — clearances ' +
        'the solver enforces and the 2D plan draws. The shells carry the colours their architects authored ' +
        '(brown doors, translucent windows), rooms that cannot ergonomically take an item say so honestly ' +
        '("no space" / "hard to reach"), and one bedroom contains a chair the user generated from a photo ' +
        'in this same app (badge OURS) — the full photo → 3D → building → BIM loop in one picture. ' +
        'X-ray ghosts the architecture so the furnishing logic is visible at a glance.</p>' +
        sc.shots.map((s) => `<div class="floor"><div class="pair" style="grid-template-columns:1fr">
          <figure><img loading="lazy" src="fleet/${s.img}"><figcaption>${s.caption}</figcaption></figure>
        </div></div>`).join('');
      main.appendChild(sec);
    }
  } catch (e) { /* no showcase captured yet */ }
  for (const b of stats) {
    const sec = document.createElement('section');
    sec.className = 'bldg';
    let html = `<h2>${b.label}</h2>`;
    if (b.error) {
      html += `<p class="err">capture failed: ${b.error}</p>`;
    } else {
      html += `<div class="badges">
        <span class="badge ok">populated in ${b.populate_s}s</span>
        <span class="badge">${(b.meta || '').replace(/^\\s*·\\s*/, '')}</span>
        <span class="badge">${b.floors.length} floor${b.floors.length === 1 ? '' : 's'}</span></div>`;
      if (b.schedule && b.schedule.length) {
        html += `<div class="sched">${b.schedule.map((s) => '• ' + s).join('<br>')}</div>`;
      }
      for (const fl of b.floors) {
        html += `<div class="floor"><h3>▤ ${fl.name}</h3><div class="pair">
          <figure><img loading="lazy" src="fleet/${b.tag}__${fl.safe}_3d.png">
            <figcaption>3D — storey isolated (dollhouse cut), real IFC colours</figcaption></figure>
          <figure><img loading="lazy" src="fleet/${b.tag}__${fl.safe}_2d.png">
            <figcaption>2D — rooms, fixed elements, furniture, green people-space</figcaption></figure>
        </div></div>`;
      }
    }
    sec.innerHTML = html;
    main.appendChild(sec);
  }
  document.querySelectorAll('.pair img').forEach((img) => {
    img.onclick = () => {
      document.getElementById('lightimg').src = img.src;
      document.getElementById('lightbox').style.display = 'flex';
    };
  });
})();
</script>
</body>
</html>
