<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCS Studio — Building Fleet Comparison</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏢</text></svg>">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --bg:#f4f6fb; --panel:#fff; --ink:#1f2733; --mut:#6b7688; --line:#e3e8f0;
          --brand:#2f6bff; --shadow:0 2px 10px rgba(20,40,80,.06); }
  body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--ink); }
  header { background:var(--panel); border-bottom:1px solid var(--line); padding:18px 28px;
           display:flex; align-items:baseline; gap:14px; position:sticky; top:0; z-index:5; }
  header h1 { font-size:20px; }
  header p { color:var(--mut); font-size:13px; }
  header a { margin-left:auto; color:var(--brand); font-size:13px; text-decoration:none; font-weight:600; }
  .vswitch { display:flex; gap:6px; margin-left:18px; }
  .vswitch button { font-family:inherit; font-size:12px; font-weight:600; padding:5px 12px;
                    border-radius:10px; border:1px solid var(--line); background:#fff;
                    color:var(--mut); cursor:pointer; }
  .vswitch button.active { background:var(--brand); border-color:var(--brand); color:#fff; }
  .badge.clash { background:#e7f7ee; border-color:#bfe8d0; color:#177a46; }
  .badge.clash.warn { background:#fdf3e7; border-color:#f4d9b0; color:#b06515; }
  main { max-width:1500px; margin:0 auto; padding:24px 28px 60px; }
  .bldg { background:var(--panel); border:1px solid var(--line); border-radius:16px;
          box-shadow:var(--shadow); padding:20px 24px; margin-bottom:28px; }
  .bldg h2 { font-size:17px; margin-bottom:2px; }
  .bldg .sub { color:var(--mut); font-size:13px; margin-bottom:6px; }
  .badges { display:flex; flex-wrap:wrap; gap:8px; margin:10px 0 4px; }
  .badge { background:#eef4ff; border:1px solid #cfe0ff; color:#1f52d6; font-size:12px;
           font-weight:600; padding:4px 12px; border-radius:10px; }
  .badge.ok { background:#e7f7ee; border-color:#bfe8d0; color:#177a46; }
  .sched { font-size:12px; color:var(--mut); margin:8px 0 2px; line-height:1.55;
           column-width: 340px; column-gap: 28px; }
  .floor { margin-top:18px; }
  .floor h3 { font-size:13px; text-transform:uppercase; letter-spacing:.05em;
              color:var(--mut); margin-bottom:8px; }
  .pair { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .pair figure { border:1px solid var(--line); border-radius:12px; overflow:hidden; background:#fff; }
  .pair img { width:100%; display:block; cursor:zoom-in; }
  .pair figcaption { font-size:11.5px; color:var(--mut); padding:7px 12px; border-top:1px solid var(--line); }
  .err { color:#d64545; font-size:13px; }
  #lightbox { position:fixed; inset:0; background:rgba(15,20,30,.88); display:none;
              align-items:center; justify-content:center; z-index:50; cursor:zoom-out; }
  #lightbox img { max-width:96vw; max-height:96vh; border-radius:8px; }
  @media (max-width: 900px) { .pair { grid-template-columns:1fr; } }
</style>
</head>
<body>
<header>
  <h1>🏢 Building Fleet Comparison</h1>
  <p>every registered building · every floor · 3D dollhouse + 2D ergonomic plan · captured live from this machine</p>
  <div class="vswitch" id="vswitch">
    <button data-v="2" class="active">v2 · clash-free</button>
    <button data-v="1">v1 · archive</button>
  </div>
  <a href="/">← back to SCS Studio</a>
</header>
<main id="main"><p style="color:var(--mut)">Loading fleet data…</p></main>
<div id="lightbox" onclick="this.style.display='none'"><img id="lightimg"></div>
<script>
async function render(version) {
  const main = document.getElementById('main');
  document.querySelectorAll('#vswitch button').forEach((b) =>
    b.classList.toggle('active', b.dataset.v === String(version)));
  const statsFile = version === 2 ? 'fleet/stats_v2.json' : 'fleet/stats.json';
  const px = version === 2 ? 'v2_' : '';
  let stats;
  try {
    stats = await (await fetch(statsFile + '?t=' + Date.now())).json();
  } catch (e) {
    main.innerHTML = '<p class="err">No capture yet — the fleet screenshots have not been generated. ' +
      'Ask Claude to re-run the fleet capture, then refresh.</p>';
    return;
  }
  main.innerHTML = '';
  if (version === 2) {
    const note = document.createElement('section');
    note.className = 'bldg';
    note.innerHTML = '<h2>🧹 Capture v2 — room-scoped clash validation</h2>' +
      '<p class="sub" style="max-width:1050px;line-height:1.65">' +
      'v1 flagged phantom clashes on L-shaped Dutch floor plans: rooms tracked as bounding ' +
      'rectangles overlap, so furniture was wrongly tested against a <i>neighbour</i> room’s ' +
      'walls bleeding into the overlap. The validator now judges every piece only against the ' +
      'room(s) that actually hold its centre (its named home room first) and only against ' +
      'furniture sharing that room; the populater also skips duplicate IfcSpace shells so no room ' +
      'is furnished twice. Result across the whole fleet below: <b>zero phantom clashes</b> — the ' +
      'single genuine tight spot (Schependomlaan) is auto-resolved by the spiral nudge.</p>';
    main.appendChild(note);
  }
  if (version === 2) main.appendChild(densitySection());
  // feature showcase (if captured): X-ray + dollhouse views of the full system
  try {
    const sc = await (await fetch('fleet/showcase.json?t=' + Date.now())).json();
    if (sc.shots && sc.shots.length) {
      const sec = document.createElement('section');
      sec.className = 'bldg';
      sec.innerHTML = '<h2>✨ Feature Showcase — the complete system</h2>' +
        '<p class="sub" style="max-width:1050px;line-height:1.65;margin-bottom:6px">' +
        'Two real architectural IFC buildings, furnished end-to-end by the ergonomics engine and rendered ' +
        'live from this machine. Every room was measured from the IFC, given a smart per-type suggestion, and ' +
        'solved with CP-SAT under human constraints: chairs pair with desks and are rotated to face them, ' +
        'monitors and laptops sit ON the desks with their screens turned toward the sitter, stools fan around ' +
        'tables in even petal rings while the table itself is pulled to the open centre of the room, planters ' +
        'flank workstations, and every piece keeps its people-space (legroom, pull-out, door swing) — clearances ' +
        'the solver enforces and the 2D plan draws. The shells carry the colours their architects authored ' +
        '(brown doors, translucent windows), rooms that cannot ergonomically take an item say so honestly ' +
        '("no space" / "hard to reach"), and one bedroom contains a chair the user generated from a photo ' +
        'in this same app (badge OURS) — the full photo → 3D → building → BIM loop in one picture. ' +
        'X-ray ghosts the architecture so the furnishing logic is visible at a glance.</p>' +
        sc.shots.map((s) => `<div class="floor"><div class="pair" style="grid-template-columns:1fr">
          <figure><img loading="lazy" src="fleet/${s.img}"><figcaption>${s.caption}</figcaption></figure>
        </div></div>`).join('');
      main.appendChild(sec);
    }
  } catch (e) { /* no showcase captured yet */ }
  for (const b of stats) {
    const sec = document.createElement('section');
    sec.className = 'bldg';
    let html = `<h2>${b.label}</h2>`;
    if (b.error) {
      html += `<p class="err">capture failed: ${b.error}</p>`;
    } else {
      let clashBadge = '';
      if (b.clashes) {
        clashBadge = b.clashes.found === 0
          ? '<span class="badge clash">✓ 0 clashes — clean solve</span>'
          : (b.clashes.after === 0
            ? `<span class="badge clash">✓ ${b.clashes.found} tight spot${b.clashes.found === 1 ? '' : 's'} → auto-resolved to 0</span>`
            : `<span class="badge clash warn">⚠ ${b.clashes.found} clashes → ${b.clashes.after} remain</span>`);
      }
      html += `<div class="badges">
        <span class="badge ok">populated in ${b.populate_s}s</span>
        <span class="badge">${(b.meta || '').replace(/^\\s*·\\s*/, '')}</span>
        <span class="badge">${b.floors.length} floor${b.floors.length === 1 ? '' : 's'}</span>${clashBadge}</div>`;
      if (b.schedule && b.schedule.length) {
        html += `<div class="sched">${b.schedule.map((s) => '• ' + s).join('<br>')}</div>`;
      }
      for (const fl of b.floors) {
        html += `<div class="floor"><h3>▤ ${fl.name}</h3><div class="pair">
          <figure><img loading="lazy" src="fleet/${px}${b.tag}__${fl.safe}_3d.png">
            <figcaption>3D — storey isolated (dollhouse cut), real IFC colours</figcaption></figure>
          <figure><img loading="lazy" src="fleet/${px}${b.tag}__${fl.safe}_2d.png">
            <figcaption>2D — rooms, fixed elements, furniture, green people-space${version === 2 ? ', clash-audited' : ''}</figcaption></figure>
        </div></div>`;
      }
    }
    sec.innerHTML = html;
    main.appendChild(sec);
  }
  document.querySelectorAll('.pair img').forEach((img) => {
    img.onclick = () => {
      document.getElementById('lightimg').src = img.src;
      document.getElementById('lightbox').style.display = 'flex';
    };
  });
}

// ---- Density & limits: medium / dense / overload stress capture (2026-07-09) ----
function densitySection() {
  const P = (t) => `<p class="sub" style="max-width:1050px;line-height:1.65;margin-bottom:10px">${t}</p>`;
  const pair = (base, cap3d, cap2d) => `<div class="pair">
    <figure><img loading="lazy" src="fleet/${base}_3d.png"><figcaption>${cap3d}</figcaption></figure>
    <figure><img loading="lazy" src="fleet/${base}_2d.png"><figcaption>${cap2d}</figcaption></figure>
  </div>`;
  const sec = document.createElement('section');
  sec.className = 'bldg';
  sec.innerHTML = `<h2>📐 Density &amp; limits — how far a room can be pushed</h2>` +
    P(`Three population profiles were driven live against the fleet: <b>medium</b> (each room's smart
       suggestion plus five extras), <b>dense</b> (a 17-category assortment — sofa, tables, chairs,
       stools, cabinets, bookshelf, coffee/side/filing furniture, lamp, planter, mirror, screens —
       pushed at every room), and <b>overload</b> (five beds and sofas forced at rooms that obviously
       cannot hold them). Space is enforced <b>twice</b>. First at add-time: every room card knows its
       area from the IFC, budgets each category's real footprint <i>plus its people-space</i> (legroom,
       pull-out, approach), assumes walls/doors/circulation consume ~45% of any real room, and refuses
       the pick with an explicit message — <i>"🚫 Not enough space in 'Kitchen' — 4 items need ≈10.8 m²
       with people-space, but only ≈7.2 m² of its 13 m² is usable. Remove something first."</i> Second
       at solve-time: the CP-SAT solver knows what the area heuristic cannot — the actual walls, door
       swings, columns and fixed kitchen elements — and whatever still doesn't fit ergonomically is
       dropped and reported per room ("✗ no space"), plus a summary toast ("Not enough space for 46
       items in 8 rooms").`) +
    `<div class="badges">
      <span class="badge">duplex medium · 32 placed · 0 clashes</span>
      <span class="badge">duplex dense · 42 placed · 41 over-adds blocked · 0 clashes</span>
      <span class="badge">german dense · 77 placed · 23 blocked · 6 clashes → 0</span>
      <span class="badge clash warn">overload · 19 of 20 adds refused with "not enough space"</span>
    </div>` +

    `<div class="floor"><h3>▤ overload — the guard says no</h3></div>` +
    `<div class="pair" style="grid-template-columns:1fr">
      <figure><img loading="lazy" src="fleet/density_overload_blocked.png">
      <figcaption>five beds/sofas forced at every duplex room — 19 of 20 attempts refused, each with the precise m² arithmetic</figcaption></figure>
    </div>` +
    P(`Every refusal names the room, counts the items, and shows the arithmetic. The one attempt that
       <i>was</i> accepted is itself informative: a second bed into the 27.7 m² Living Room — by pure
       area it fits, and the guard is deliberately a heuristic that only blocks what <i>cannot possibly</i>
       fit; borderline cases are allowed through so the solver, which sees the real walls, can give the
       final verdict.`) +

    `<div class="floor"><h3>▤ duplex · medium (+5 per room)</h3></div>` +
    pair('density_duplex_medium_L1', '3D — Level 1, medium density', '2D — 32 placed, 0 clashes; kitchens expose the area-vs-floor gap') +
    P(`Medium load places 32 pieces with zero clashes. The interesting irregularity is the
       <b>Kitchen: 0 of 6 placed</b> despite "13 m²" on paper — the duplex kitchens are almost entirely
       counters, appliances and door swing, so the real free floor is a fraction of the attribute area.
       The add-time guard (which reasons from area) accepted the picks; the solver (which sees the fixed
       elements) refused all of them and said so honestly. This two-tier disagreement is by design:
       the guard prevents absurd requests instantly, the solver owns the truth.`) +

    `<div class="floor"><h3>▤ duplex · dense (17-item assortment per room)</h3></div>` +
    pair('density_duplex_dense_L1', '3D — Level 1 at maximum ergonomic density', '2D — every green zone intact, nothing overlaps') +
    P(`The dense profile threw 17 categories at every room; the guard trimmed 41 over-adds at the
       moment of picking (with the "getting tight" warning firing first), the solver placed 42 pieces
       and dropped 46 more with per-room reasons. Two irregularities surfaced. <b>Identical rooms
       diverge:</b> Bedroom 1 and Bedroom 2 are both 23.2 m², yet Bedroom 1 kept its bed (6/10 placed)
       while Bedroom 2 dropped it (5/10) — their door and obstacle layouts differ, and a bed needs BOTH
       side-access zones, so the same shopping list meets a different fate one wall away. <b>Screens
       need desks:</b> monitors and laptops cost no floor space (they ride on worksurfaces), but in
       rooms where the desk itself didn't survive the density cut, the orphaned screens were dropped
       too — "no space: monitor, laptop" in a room with visible floor left is the solver refusing to
       put a monitor on the carpet.`) +

    `<div class="floor"><h3>▤ german apartment · dense</h3></div>` +
    pair('density_german_dense', '3D — top storey at dense load', '2D — 77 placed; 6 genuine tight spots auto-resolved to 0') +
    P(`The German apartment took 77 pieces across 12 rooms. At this density the first genuine clashes
       of the whole exercise appeared — six of them — and the spiral auto-resolver cleared all six
       without human help. The "hard to reach" circulation warnings (bookshelf, cabinet, sofa in the
       Wohnküche) are the early-warning tier: the piece fits, but the walking path to it pinches below
       the comfortable aisle. One semantic limit to know about: the <b>Loggia and Balkon accepted
       furniture freely</b> (the Loggia swallowed all 17 dense picks — it is 23.2 m² of genuinely empty
       floor). Geometrically correct, semantically odd — the room classifier's German keyword list does
       not yet tag outdoor spaces as unfurnishable, so a loggia is treated like any large empty room.
       That is the honest edge of the current system.`) +

    P(`<b>Where the limits sit, in numbers:</b> a 13 m² room saturates at roughly 4–6 real furniture
       pieces once people-space is charged; a 23 m² bedroom at 5–6 plus on-desk electronics; a 28 m²
       living space at 9–12. Past that, the system degrades in the designed order: first the tight-fit
       warning, then the add-time refusal with the m² arithmetic, then the solver's per-room "no space"
       drops, and only at extreme density do physical clashes appear — every one of which the
       auto-resolver cleared in these runs. At no point did over-asking corrupt a layout: the response
       to "too many items" is always a message, never a broken room.`);
  return sec;
}

document.querySelectorAll('#vswitch button').forEach((b) => {
  b.onclick = () => render(+b.dataset.v);
});
render(2);
</script>
</body>
</html>
