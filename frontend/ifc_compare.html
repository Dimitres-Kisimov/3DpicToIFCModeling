<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IFC optimizer — before / after</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body { height:100%; overflow:hidden; font-family:'Segoe UI',system-ui,sans-serif; background:#eef2f9; color:#1f2733; }
    .grid { display:grid; grid-template-columns:1fr 1fr; height:100vh; }
    .panel { position:relative; border-right:1px solid #d7deea; overflow:hidden; }
    .panel:last-child { border-right:none; }
    canvas { width:100%; height:100%; display:block; }
    .cap { position:absolute; top:12px; left:12px; right:12px; z-index:5; background:rgba(255,255,255,.92);
      border:1px solid #d7deea; border-radius:10px; padding:9px 13px; box-shadow:0 2px 8px rgba(20,40,80,.08); }
    .cap b { font-size:15px; } .cap span { font-size:12px; color:#6b7688; display:block; margin-top:2px; }
    .cap.a b { color:#c0392b; } .cap.b b { color:#1faa60; }
    .hint { position:fixed; bottom:10px; left:50%; transform:translateX(-50%); z-index:10; font-size:12px;
      color:#6b7688; background:rgba(255,255,255,.92); padding:6px 14px; border-radius:20px; border:1px solid #d7deea; }
  </style>
</head>
<body>
  <div class="grid">
    <div class="panel"><div class="cap a"><b>IFC — BEFORE</b><span>bed · 150,000 faces · 5.1 MB</span></div><canvas id="c0"></canvas></div>
    <div class="panel"><div class="cap b"><b>IFC — AFTER (optimized)</b><span>bed · 15,000 faces · 420 KB · −90% faces, −92% size · valid IFC4</span></div><canvas id="c1"></canvas></div>
  </div>
  <div class="hint">🖱️ Drag = orbit · Scroll = zoom · same object, 5× lighter IFC</div>
  <script type="module">
    import * as xeokit from '/vendor/xeokit-sdk/xeokit-sdk.min.es.js';
    const models = [
      { canvas:'c0', src:'/outputs/ifc_before.glb' },
      { canvas:'c1', src:'/outputs/ifc_after.glb' },
    ];
    for (const m of models) {
      const viewer = new xeokit.Viewer({ canvasId: m.canvas, transparent:false });
      viewer.scene.canvas.backgroundColor = [0.93,0.95,0.98];
      try { viewer.cameraFlight.fitFOV = 50; } catch(e){}
      const loader = new xeokit.GLTFLoaderPlugin(viewer);
      const model = loader.load({ id:'m', src:m.src + '?t=' + Date.now(), edges:false });
      model.on('loaded', () => { try { model.rotation = [180,0,90]; } catch(e){} try { viewer.cameraFlight.flyTo(model); } catch(e){} });
      model.on('error', (e) => console.warn(m.src, e));
    }
  </script>
</body>
</html>
