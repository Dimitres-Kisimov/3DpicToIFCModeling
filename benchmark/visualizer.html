<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Candidate Visualizer — pick the winning mesh</title>
<style>
:root{--bg:#f6f8fb;--card:#fff;--ink:#1c2733;--mut:#5b6b7c;--line:#e3e9f1;--acc:#2f81f7;--good:#1a7f4b}
*{box-sizing:border-box}body{margin:0;font:14px/1.5 'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--ink);display:flex;height:100vh;overflow:hidden}
#side{width:300px;min-width:300px;border-right:1px solid var(--line);background:var(--card);overflow-y:auto;padding:14px}
#side h1{font-size:16px;margin:0 0 4px}
#side .sub{color:var(--mut);font-size:12px;margin:0 0 12px}
#side select{width:100%;padding:6px;margin:0 0 10px;border:1px solid var(--line);border-radius:8px;font:inherit}
.item{padding:7px 9px;border-radius:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.item:hover{background:#eef3fa}
.item.active{background:#e3edfd;font-weight:600}
.item .picked{font-size:11px;color:var(--good)}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#head{padding:12px 18px;border-bottom:1px solid var(--line);background:var(--card);display:flex;gap:16px;align-items:center;flex-wrap:wrap}
#head img{height:74px;border-radius:8px;border:1px solid var(--line)}
#head .t{font-size:17px;font-weight:600}
#head .m{color:var(--mut);font-size:12px}
#head button{margin-left:auto;padding:8px 14px;border:1px solid var(--line);background:#fff;border-radius:8px;cursor:pointer;font:inherit}
#head button:hover{border-color:var(--acc);color:var(--acc)}
#grid{flex:1;display:grid;grid-auto-flow:column;grid-auto-columns:1fr;gap:12px;padding:12px;overflow:hidden}
.cand{background:var(--card);border:2px solid var(--line);border-radius:12px;display:flex;flex-direction:column;overflow:hidden}
.cand.selected{border-color:var(--good);box-shadow:0 0 0 3px #1a7f4b22}
.cand .bar{padding:8px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line)}
.cand .bar .n{font-weight:600}
.cand .bar .s{font-size:11.5px;color:var(--mut)}
.cand canvas{width:100%;height:100%;display:block;cursor:grab}
.cand .vp{flex:1;position:relative;min-height:0}
.emblem{position:absolute;left:10px;bottom:10px;z-index:2;pointer-events:none;
        font-size:11px;font-weight:700;letter-spacing:.02em;padding:3px 9px;border-radius:9px;
        background:#eef3fa;color:#3d4f63;border:1px solid #d7e0ec}
.emblem.ours{background:#fdf3e7;color:#e0812b;border-color:#f3d9bb}
.cand .pick{margin:8px 12px 10px;padding:8px;border-radius:8px;border:1px solid var(--line);background:#fff;cursor:pointer;font:inherit}
.cand.selected .pick{background:var(--good);color:#fff;border-color:var(--good)}
#hint{position:fixed;bottom:8px;right:14px;color:var(--mut);font-size:11.5px}
</style>
</head>
<body>
<div id="side">
  <h1>🎛 Candidate Visualizer</h1>
  <p class="sub">Rotate each mesh variant. Click <b>Select</b> on the winner. Selections persist locally; export as JSON.</p>
  <select id="listSel"></select>
  <div id="items"></div>
</div>
<div id="main">
  <div id="head">
    <img id="photo" alt="" hidden>
    <div><div class="t" id="title">—</div><div class="m" id="meta"></div></div>
    <button id="rotBtn" title="Toggle the X-up display rotation if a mesh appears sideways">↺ Rotation</button>
    <button id="exportBtn">⬇ Export selections.json</button>
  </div>
  <div id="grid"></div>
</div>
<div id="hint">drag = orbit · wheel = zoom · right-drag = pan</div>

<script type="importmap">
{"imports":{
  "three":"https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';

const state = {data:null, list:null, item:null, viewers:[], xup:true};
const store = {
  get all(){ try{return JSON.parse(localStorage.getItem('candidate_selections')||'{}')}catch(e){return {}} },
  set(k,v){ const a=this.all; a[k]=v; localStorage.setItem('candidate_selections', JSON.stringify(a)); },
  get(k){ return this.all[k]; }
};
const keyOf = it => `${it.list}/${it.category}`;

const resp = await fetch('candidates.json');
state.data = await resp.json();
const lists = [...new Set(state.data.items.map(i=>i.list))];
const listSel = document.getElementById('listSel');
listSel.innerHTML = lists.map(l=>`<option>${l}</option>`).join('');
listSel.onchange = ()=>{ state.list=listSel.value; renderSidebar(); };
state.list = lists[0];

function renderSidebar(){
  const box = document.getElementById('items');
  const items = state.data.items.filter(i=>i.list===state.list);
  box.innerHTML='';
  items.forEach(it=>{
    const d=document.createElement('div');
    d.className='item'+(state.item===it?' active':'');
    const picked = store.get(keyOf(it));
    d.innerHTML=`<span>${it.display}</span>${picked?`<span class="picked">✓ ${picked}</span>`:''}`;
    d.onclick=()=>{ state.item=it; renderSidebar(); showItem(it); };
    box.appendChild(d);
  });
  if(!state.item || state.item.list!==state.list){ state.item=items[0]; if(state.item) showItem(state.item); }
}

function disposeViewers(){
  state.viewers.forEach(v=>{ cancelAnimationFrame(v.raf); v.controls.dispose(); v.renderer.dispose(); });
  state.viewers=[];
}

function showItem(it){
  disposeViewers();
  document.getElementById('title').textContent = `${it.display} — ${it.list}`;
  document.getElementById('meta').textContent = `generated ${it.generated_at||'?'} · ${it.variants.length} candidates`;
  const ph=document.getElementById('photo');
  if(it.image){ ph.src=it.image; ph.hidden=false; } else ph.hidden=true;
  const grid=document.getElementById('grid'); grid.innerHTML='';
  it.variants.forEach(v=>{
    const card=document.createElement('div');
    card.className='cand'+(store.get(keyOf(it))===v.key?' selected':'');
    const stats=[v.faces?`${v.faces.toLocaleString()} faces`:null,
                 v.watertight===true?'watertight ✓':(v.watertight===false?'open':null),
                 v.iou!=null?`IoU ${v.iou}`:null].filter(Boolean).join(' · ');
    const engine = v.engine || v.key;
    const emblem = v.ours ? `★ OURS · ${engine}` : engine;
    card.innerHTML=`<div class="bar"><span class="n">${v.label}</span><span class="s">${stats}</span>
                    <span class="rot"><button class="r90" title="Rotate 90° (yaw) — same as the app's R">↻90°</button>
                    <button class="rp" title="Pitch 90° — fix a wrong-face-up mesh">⤴90°</button></span></div>
                    <div class="vp"><span class="emblem${v.ours?' ours':''}">${emblem}</span></div>
                    <button class="pick">Select this one</button>`;
    card.querySelector('.pick').onclick=()=>{
      store.set(keyOf(it), v.key);
      grid.querySelectorAll('.cand').forEach(c=>c.classList.remove('selected'));
      card.classList.add('selected');
      renderSidebar();
    };
    grid.appendChild(card);
    const viewer = mountViewer(card.querySelector('.vp'), v.glb);
    // 90° steps, planEditor.rotateSelected style: rot = (rot + 90) % 360
    card.querySelector('.r90').onclick = e => { e.stopPropagation(); viewer.yaw = (viewer.yaw + 90) % 360; viewer.applyRot(); };
    card.querySelector('.rp').onclick  = e => { e.stopPropagation(); viewer.pitch = (viewer.pitch + 90) % 360; viewer.applyRot(); };
  });
}

function mountViewer(el, url){
  const renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  el.appendChild(renderer.domElement);
  const scene=new THREE.Scene(); scene.background=new THREE.Color(0xffffff);
  const cam=new THREE.PerspectiveCamera(38, 1, 0.01, 100);
  scene.add(new THREE.HemisphereLight(0xffffff, 0xdde3ec, 1.05));
  const dl=new THREE.DirectionalLight(0xffffff, 1.4); dl.position.set(3,5,4); scene.add(dl);
  const dl2=new THREE.DirectionalLight(0xffffff, 0.5); dl2.position.set(-4,2,-3); scene.add(dl2);
  const controls=new OrbitControls(cam, renderer.domElement); controls.enableDamping=true;
  const holder=new THREE.Group(); scene.add(holder);
  const v={renderer, controls, raf:0, yaw:0, pitch:0,
           applyRot(){ holder.rotation.set(THREE.MathUtils.degToRad(this.pitch),
                                           THREE.MathUtils.degToRad(this.yaw), 0); }};
  new GLTFLoader().load(url, g=>{
    const obj=g.scene;
    if(state.xup) obj.rotation.z = Math.PI/2;           // native X-up -> screen Y-up
    const box=new THREE.Box3().setFromObject(obj);
    const c=box.getCenter(new THREE.Vector3()), s=box.getSize(new THREE.Vector3()).length();
    obj.position.sub(c);
    holder.add(obj);
    cam.position.set(s*0.75, s*0.45, s*0.9); cam.lookAt(0,0,0);
    controls.update();
  });
  function size(){
    const w=el.clientWidth, h=el.clientHeight;
    if(w&&h){ renderer.setSize(w,h,false); cam.aspect=w/h; cam.updateProjectionMatrix(); }
  }
  new ResizeObserver(size).observe(el); size();
  (function loop(){ v.raf=requestAnimationFrame(loop); controls.update(); renderer.render(scene,cam); })();
  state.viewers.push(v);
  return v;
}

document.getElementById('rotBtn').onclick=()=>{ state.xup=!state.xup; if(state.item) showItem(state.item); };
document.getElementById('exportBtn').onclick=()=>{
  const blob=new Blob([JSON.stringify({exported_at:new Date().toISOString(), selections:store.all}, null, 1)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='selections.json'; a.click();
};

renderSidebar();
</script>
</body>
</html>
