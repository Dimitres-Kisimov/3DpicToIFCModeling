<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IFC Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #2b2b2b; }
        #viewer-canvas {
            width: 100%;
            height: 100%;
            position: absolute;
            background: linear-gradient(180deg, #3a3f47 0%, #1e2126 100%);
        }
        #status {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: #aaa;
            font-family: 'Segoe UI', sans-serif;
            font-size: 12px;
            pointer-events: none;
            z-index: 10;
        }
        #empty-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #666;
            font-family: 'Segoe UI', sans-serif;
            font-size: 16px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <canvas id="viewer-canvas"></canvas>
    <div id="empty-msg">No model loaded.<br>Generate an IFC model to view it here.</div>
    <div id="status">xeokit ready</div>

    <script src="qwebchannel.js"></script>
    <script type="module" src="viewer.js"></script>
</body>
</html>
